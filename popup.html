<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 250px;
      padding: 15px;
      font-family: 'Segoe UI', sans-serif;
      background: #ffffff;
      margin: 0;
    }
    .header {
      font-size: 16px;
      font-weight: bold;
      color: #333;
      margin-bottom: 20px;
      border-bottom: 2px solid #ff0000;
      padding-bottom: 5px;
    }
    .control-group {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }
    .item {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .item label {
      font-size: 14px;
      color: #444;
    }
    .master-item {
      padding-bottom: 15px;
      margin-bottom: 5px;
      border-bottom: 1px solid #eee;
    }
    .master-item label {
      font-weight: bold;
    }

    /* スイッチのデザイン */
    .switch {
      position: relative;
      display: inline-block;
      width: 46px;
      height: 24px;
    }
    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #ccc;
      transition: .4s;
      border-radius: 24px;
    }
    .slider:before {
      position: absolute;
      content: "";
      height: 18px;
      width: 18px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      transition: .4s;
      border-radius: 50%;
    }
    input:checked + .slider {
      background-color: #ff0000;
    }
    input:checked + .slider:before {
      transform: translateX(22px);
    }
  </style>
</head>
<body>
  <div class="header">YouTube Comment Blocker</div>
  <div class="control-group">
    <div class="item master-item">
      <label for="master">一括設定</label>
      <label class="switch">
        <input type="checkbox" id="master">
        <span class="slider"></span>
      </label>
    </div>
    <div class="item">
      <label for="regular">通常動画 (非表示)</label>
      <label class="switch">
        <input type="checkbox" id="regular">
        <span class="slider"></span>
      </label>
    </div>
    <div class="item">
      <label for="shorts">Shorts (グレーアウト)</label>
      <label class="switch">
        <input type="checkbox" id="shorts">
        <span class="slider"></span>
      </label>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
